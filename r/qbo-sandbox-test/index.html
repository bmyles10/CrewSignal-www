<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0; url=https://g.page/qbo-sandbox-test/review">
<title>Leave a review for QBO Sandbox Test</title>
<meta name="robots" content="noindex">
<style>
  body { font-family: system-ui, sans-serif; background: #f4f1ea; color: #16191d;
          display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .box { text-align: center; padding: 32px; max-width: 420px; }
  a { color: #ff5a1f; font-weight: 700; }
</style>
<script>
(function() {
  try {
    var trackingBase = "https://api.getcrewsignal.com";
    var campaignId = new URLSearchParams(window.location.search).get('c');
    if (trackingBase && campaignId) {
      var trackingUrl = trackingBase + '/api/v1/track-click/' + encodeURIComponent(campaignId);
      if (navigator.sendBeacon) {
        navigator.sendBeacon(trackingUrl);
      } else {
        fetch(trackingUrl, { method: 'POST', keepalive: true }).catch(function() {});
      }
    }
  } catch (e) {}
  window.location.replace("https://g.page/qbo-sandbox-test/review");
})();
</script>
</head>
<body>
  <div class="box">
    <p>Taking you to leave a review for QBO Sandbox Test&hellip;</p>
    <p><a href="https://g.page/qbo-sandbox-test/review">Click here if you're not redirected automatically.</a></p>
  </div>
</body>
</html>
